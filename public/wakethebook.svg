<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Gradient tła (Głęboki, nocny granat przechodzący w kosmiczny fiolet) -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0A0F1C" />
            <stop offset="100%" stop-color="#161429" />
        </linearGradient>

        <!-- Gradient dla wschodzącego słońca / fal dźwiękowych ("Wake") -->
        <linearGradient id="sunriseWave" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#FF3B7C" /> <!-- Poranny róż -->
            <stop offset="50%" stop-color="#FF7854" /> <!-- Energetyczna pomarańcz -->
            <stop offset="100%" stop-color="#FFD34E" /> <!-- Złoty świt -->
        </linearGradient>

        <!-- Gradient dla otwartej książki ("The Book") -->
        <linearGradient id="bookGlow" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#818CF8" />
            <stop offset="50%" stop-color="#C084FC" />
            <stop offset="100%" stop-color="#818CF8" />
        </linearGradient>

        <!-- Delikatny cień dla przycisku Play -->
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.4" />
        </filter>
    </defs>

    <!-- Tło aplikacji (Kształt "Squircle" używany w iOS/Android) -->
    <rect width="512" height="512" rx="116" fill="url(#bgGradient)" />

    <!-- Tło książki - nadaje głębi (kolejne strony pod spodem) -->
    <path d="M 100 370 Q 178 320 256 400 Q 334 320 412 370" 
          stroke="#4F46E5" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.4" />

    <!-- Główny kształt Książki (Minimalistyczna krzywa) -->
    <path d="M 80 340 Q 168 280 256 370 Q 344 280 432 340" 
          stroke="url(#bookGlow)" stroke-width="24" stroke-linecap="round" fill="none" />

    <!-- "Pobudka" & "Audio" - Equalizer w kształcie wschodzącego słońca -->
    <g stroke="url(#sunriseWave)" stroke-width="28" stroke-linecap="round">
        <!-- Zewnętrzny lewy -->
        <line x1="120" y1="230" x2="120" y2="300" />
        <!-- Wewnętrzny lewy -->
        <line x1="188" y1="160" x2="188" y2="290" />
        <!-- Centralny (Najwyższy) -->
        <line x1="256" y1="100" x2="256" y2="340" />
        <!-- Wewnętrzny prawy -->
        <line x1="324" y1="160" x2="324" y2="290" />
        <!-- Zewnętrzny prawy -->
        <line x1="392" y1="230" x2="392" y2="300" />
    </g>

    <!-- Przycisk Play wkomponowany w centrum wschodu słońca -->
    <g filter="url(#dropShadow)">
        <!-- Ciemne kółko wycinające wizualnie przestrzeń z centralnego paska -->
        <circle cx="256" cy="230" r="46" fill="#0A0F1C" stroke="url(#sunriseWave)" stroke-width="4" />
        <!-- Optycznie wyśrodkowany trójkąt "Play" -->
        <path d="M 240 204 L 282 230 L 240 256 Z" fill="#F8FAFC" />
    </g>

    <!-- Dwie subtelne, poranne gwiazdy dodające "magii" (proces AI) -->
    <circle cx="150" cy="110" r="4" fill="#FFD34E" opacity="0.8" />
    <circle cx="370" cy="150" r="5" fill="#FF7854" opacity="0.9" />
</svg>